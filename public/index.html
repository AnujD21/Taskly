<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskly — Stay on top of your day</title>
  <meta name="description" content="Taskly is a clean, fast, and beautiful todo app to help you manage your daily tasks effortlessly." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background blobs -->
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <div class="app-wrapper">

    <!-- ── Sidebar ─────────────────────────────── -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span class="brand-name">Taskly</span>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-filter="all" onclick="setFilter('all')">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          All Tasks
          <span class="nav-badge" id="allBadge">0</span>
        </button>
        <button class="nav-item" data-filter="active" onclick="setFilter('active')">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Active
          <span class="nav-badge" id="activeBadge">0</span>
        </button>
        <button class="nav-item" data-filter="completed" onclick="setFilter('completed')">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          Completed
          <span class="nav-badge" id="completedBadge">0</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="progress-section">
          <div class="progress-label">
            <span>Today's progress</span>
            <span id="progressPct">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
      </div>
    </aside>

    <!-- ── Main Content ──────────────────────────── -->
    <main class="main">

      <!-- Header -->
      <header class="main-header">
        <div class="header-left">
          <h1 id="filterTitle">All Tasks</h1>
          <p class="header-date" id="headerDate"></p>
        </div>
        <button class="clear-btn" id="clearBtn" onclick="clearCompleted()" title="Clear all completed tasks">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Clear completed
        </button>
      </header>

      <!-- Add Task Input -->
      <div class="add-task-bar">
        <div class="add-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <input
          type="text"
          id="todoInput"
          placeholder="Add a new task…"
          autocomplete="off"
          maxlength="150"
        />
        <button class="add-btn" id="addBtn" onclick="addTodo()">Add Task</button>
      </div>

      <!-- Task List -->
      <div class="task-list-wrapper">
        <ul id="todoList"></ul>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state" style="display:none;">
          <div class="empty-illustration">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          </div>
          <h3 id="emptyTitle">No tasks yet</h3>
          <p id="emptySubtitle">Add your first task above to get started.</p>
        </div>
      </div>

    </main>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
